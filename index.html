<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Twin AR - Fase 2</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }

        .ui-panel {
            position: absolute; top: 20px; right: 20px; width: 220px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px);
            color: white; padding: 20px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        .data-label { color: #00ff88; font-family: monospace; font-weight: bold; }
        h4 { margin: 0 0 10px 0; font-size: 12px; letter-spacing: 2px; color: #aaa; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-panel">
        <h4>SISTEMA AR ATIVO</h4>
        <div style="font-size: 14px;">
            TEMP: <span id="val-temp" class="data-label">--</span>°C<br>
            EIXO X: <span id="val-inc" class="data-label">--</span>°<br>
            EIXO Y: <span id="val-inc2" class="data-label">--</span>°
        </div>
    </div>

    <video id="webcam" autoplay playsinline style="display:none;"></video>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Config Firebase (Mantido conforme anterior)
        const firebaseConfig = {
            apiKey: "AIzaSyAkPuU0caKcpApNAII_gC5CxaBmGLXv_9Q",
            authDomain: "next2k26-1a3e7.firebaseapp.com",
            databaseURL: "https://next2k26-1a3e7-default-rtdb.firebaseio.com",
            projectId: "next2k26-1a3e7"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let scene, camera, renderer, controls, model;
        let targetX = 0, currentX = 0;
        let targetY = 0, currentY = 0;
        const SMOOTHING = 0.03;

        const video = document.getElementById('webcam');

        init();

        async function init() {
            scene = new THREE.Scene();

            // Configurar Câmera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);

            // Configurar Renderer com suporte a transparência e PBR
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping; // Melhora o realismo das cores
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Luzes para o modelo 3D
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            // INICIAR WEBCAM (REALIDADE AUMENTADA)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 1280, height: 720 }
                });
                video.srcObject = stream;
                video.play();

                const videoTexture = new THREE.VideoTexture(video);
                videoTexture.colorSpace = THREE.SRGBColorSpace;
                scene.background = videoTexture; // Define o vídeo como fundo da cena
            } catch (err) {
                console.error("Erro ao acessar webcam:", err);
                scene.background = new THREE.Color(0x111111);
            }

            // Carregar Modelo .glb
            const loader = new GLTFLoader();
            loader.load('modelo.glb', (gltf) => {
                model = gltf.scene;
                scene.add(model);

                // Aplicar Environment Map para reflexos reais (PBR)
                const pmremGenerator = new THREE.PMREMGenerator(renderer);
                scene.environment = pmremGenerator.fromScene(new THREE.Scene()).texture;

                conectarFirebase();
            });

            animate();
        }

        function conectarFirebase() {
            onValue(ref(db, 'Inclinacao'), s => { targetX = (s.val() || 0) * (Math.PI / 180); document.getElementById('val-inc').innerText = s.val(); });
            onValue(ref(db, 'Inclinacao2'), s => { targetY = (s.val() * -1 || 0) * (Math.PI / 180); document.getElementById('val-inc2').innerText = s.val(); });
            onValue(ref(db, 'Temperatura'), s => { document.getElementById('val-temp').innerText = (s.val() || 0).toFixed(1); });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            currentX += (targetX - currentX) * SMOOTHING;
            currentY += (targetY - currentY) * SMOOTHING;

            if (model) {
                model.rotation.z = currentX;
                model.rotation.x = currentY;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
