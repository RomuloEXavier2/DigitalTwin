<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Twin - NEXT 2026 Stable</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #e0e0e0; }
        #canvas-container { width: 100vw; height: 100vh; }
        .ui-panel {
            position: absolute; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px); padding: 15px; border-radius: 12px;
            z-index: 10; top: 20px; right: 20px; width: 200px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .data-label { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-panel">
        <h4 style="margin:0 0 10px 0; font-size: 11px; color: #666; text-transform: uppercase;">Telemetria Digital</h4>
        <div style="font-size: 14px; line-height: 1.6;">
            Temp: <span id="val-temp" class="data-label">--</span>°C<br>
            Eixo X: <span id="val-inc" class="data-label">--</span>°<br>
            Eixo Y: <span id="val-inc2" class="data-label">--</span>°
        </div>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkPuU0caKcpApNAII_gC5CxaBmGLXv_9Q",
            authDomain: "next2k26-1a3e7.firebaseapp.com",
            databaseURL: "https://next2k26-1a3e7-default-rtdb.firebaseio.com",
            projectId: "next2k26-1a3e7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let scene, camera, renderer, controls, model;
        let targetX = 0, currentX = 0;
        let targetY = 0, currentY = 0;
        const SMOOTHING = 0.03; // Movimento "manteiga"

        let motores = [];

        init3D();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xdcdcdc);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 8, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            new GLTFLoader().load('modelo.glb', (gltf) => {
                model = gltf.scene;
                scene.add(model);
                model.traverse((node) => {
                    if (node.name.includes('ServoMotor_ASSEM')) {
                        node.traverse(c => { if(c.isMesh) c.material = c.material.clone(); });
                        motores.push(node);
                    }
                });
                conectarFirebase();
            });
            animate();
        }

        function conectarFirebase() {
            onValue(ref(db, 'Inclinacao'), s => {
                targetX = (s.val() || 0) * (Math.PI / 180);
                document.getElementById('val-inc').innerText = s.val();
            });
            onValue(ref(db, 'Inclinacao2'), s => {
                targetY = (s.val() * -1 || 0) * (Math.PI / 180);
                document.getElementById('val-inc2').innerText = s.val();
            });
            onValue(ref(db, 'Temperatura'), (snap) => {
                const t = snap.val() || 0;
                document.getElementById('val-temp').innerText = t.toFixed(2);
                const f = Math.min(Math.max((t - 28) / 7, 0), 1);
                motores.forEach(m => {
                    m.traverse(n => { if(n.isMesh) n.material.color.setRGB(1, 1-f, 1-f); });
                });
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            currentX += (targetX - currentX) * SMOOTHING;
            currentY += (targetY - currentY) * SMOOTHING;

            if(model) {
                model.rotation.z = currentX;
                model.rotation.x = currentY;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
